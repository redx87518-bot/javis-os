name: Build JAVIS OS APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Verify Gradle
        run: gradle --version

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --no-build-cache --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"

      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: gradle assembleRelease --no-daemon --no-build-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JAVIS-OS-debug-v${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/upload-artifact@v4
        with:
          name: JAVIS-OS-release-v${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "## JAVIS OS Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for apk in app/build/outputs/apk/**/*.apk; do
            [ -f "$apk" ] && echo "| $(basename $apk) | $(du -sh $apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
