name: Build JAVIS OS APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javis-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: javis-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "## JAVIS OS Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "**Debug APK size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
