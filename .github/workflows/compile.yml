name: Compile JAVIS OS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --no-build-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JAVIS-OS-v${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 60

      - name: Summary
        if: always()
        run: |
          echo "## JAVIS OS Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ APK built successfully — **$SIZE**" >> $GITHUB_STEP_SUMMARY
            echo "Download from Artifacts above." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed. Check logs." >> $GITHUB_STEP_SUMMARY
          fi
